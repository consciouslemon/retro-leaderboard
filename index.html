<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Reviews Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    .retro-font { font-family: 'Press Start 2P', monospace; }
    
    /* Custom Drop Shadow for the Floating Boxart.
       Gives depth to the 3D asset over the transparent area.
    */
    .floating-shadow {
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.7));
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

  <header class="py-8 border-b-4 border-yellow-500 bg-gray-950 text-center">
    <h1 class="retro-font text-xl md:text-3xl text-yellow-500 tracking-wider uppercase drop-shadow-[0_4px_0_rgba(0,0,0,1)]">
      The Leaderboard
    </h1>
    <p class="text-gray-400 mt-3 text-xs md:text-sm tracking-wide">Where every reviewed classic stacks up</p>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-10">
    <div id="leaderboard-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-x-6 gap-y-12">
      </div>
  </main>

  <script>
    async function loadLeaderboard() {
      try {
        const response = await fetch('games.json');
        const games = await response.json();
        
        // Always sort dynamically by rank ascending
        games.sort((a, b) => a.rank - b.rank);

        const grid = document.getElementById('leaderboard-grid');
        grid.innerHTML = games.map(game => {
          const platforms = Array.isArray(game.platform) ? game.platform : [game.platform];
          
          const platformBadges = platforms.map(plat => `
            <span class="inline-block bg-blue-900 text-blue-300 text-[9px] font-semibold px-1.5 py-0.5 rounded uppercase tracking-wider mr-1 mb-1">
              ${plat}
            </span>
          `).join('');

          return `
            <div class="relative flex flex-col group h-full opacity-0 translate-y-10 transition-all duration-700 ease-out scroll-reveal">
              
              <div class="relative z-10 w-full mb-3 floating-shadow transform group-hover:scale-105 transition-transform duration-300 ease-out">
                
                <img src="${game.boxArt}" 
                     alt="${game.title} Box Art" 
                     class="object-contain w-full h-auto"
                     onerror="this.src='https://placehold.co/300x400/1f2937/9ca3af?text=No+Image'">
                
                <div class="absolute -top-3 -left-3 bg-yellow-500 text-gray-950 retro-font text-[10px] px-2 py-1 font-bold z-20 border-2 border-black shadow-md drop-shadow-lg">
                  #${game.rank}
                </div>

              </div>

              <div class="p-3 flex-grow flex flex-col justify-between bg-gray-950 border-4 border-gray-800 rounded-none shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <div>
                  <h2 class="font-bold text-sm text-white line-clamp-2 leading-snug">${game.title}</h2>
                  <div class="flex flex-wrap mt-1.5">
                    ${platformBadges}
                  </div>
                </div>
                
                <div class="mt-3 pt-2 border-t border-gray-800 flex items-center justify-between">
                  <span class="retro-font text-yellow-400 text-xs">${game.score}</span>
                  ${game.videoUrl ? `
                    <a href="${game.videoUrl}" target="_blank" class="text-xs text-red-400 hover:text-red-300 font-medium underline flex items-center gap-1">
                      Review →
                    </a>
                  ` : ''}
                </div>
              </div>

            </div>
          `;
        }).join('');

        // NEW: Call the observer right here, AFTER the grid.innerHTML is fully populated!
        initScrollReveal();

      } catch (error) {
        console.error("Error fetching or parsing games.json:", error);
      }
    }

    function initScrollReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.remove('opacity-0', 'translate-y-10');
            observer.unobserve(entry.target);
          }
        });
      }, {
        threshold: 0.1
      });

      document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
    }

    // Keep the event listener clean and simple
    document.addEventListener('DOMContentLoaded', loadLeaderboard);
  </script>
</body>
</html>
